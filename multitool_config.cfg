#####################################################################
# klipper-multitool-stats - 默认配置文件
#
# 此文件由 install.sh 自动复制到 ~/printer_data/config/multitool/。
# 你应该：
#   1. 修改下面的 [multitool] 字段（tool_count / z_hop / accel 等）
#   2. 替换 multitool_release_tool / multitool_pickup_tool 两个钩子宏
#      的实现，写入你机器的真实换头动作
#
# 重要：默认钩子实现会直接 action_raise_error 报错。
#       不替换钩子无法完成换头。
#####################################################################


#####################################################################
# 持久化变量
#####################################################################
[save_variables]
filename: ~/printer_data/config/myvariables.cfg


#####################################################################
# 多热端切换插件主配置
#   T0..T{n-1} / UNTOOL / CHANGE_TOOL / QUERY_TOOL_STATUS / 状态恢复
#####################################################################
[multitool]
tool_count: 4            # 热端数量
z_hop: 0.4               # 换头抬升高度
feed_z: 600              # 抬升速度 (mm/min)
accel_swap: 8000         # 换头期间加速度
untool_safe_z: 10        # 上次为"无热端"时第一动作要抬到的安全 Z
untool_unhomed_prepare: True  # UNTOOL 时若 XYZ 未完整归位，先归位缺失的 XY 轴、临时设置 Z=0 并抬升 10mm
sync_active_spool: True  # 换头后同步 Spoolman 当前料盘
sync_active_extruder: True  # 换头后同步 Klipper active extruder
sync_extruder_motion: True  # 共用物理 E 步进时，同步该步进到当前热端队列；独立 E 步进机器设 False
extruder_motion_sync_stepper: extruder  # 需要同步运动队列的共享 E 步进名
default_pressure_advance_extruder: extruder  # 共用物理 E 步进时，将未指定 EXTRUDER 的 SET_PRESSURE_ADVANCE 作用到该步进
extrude_compensation_length: 3.0  # 释放前回抽/抓取后挤出补偿共用长度(mm)，0=关闭
extrude_compensation_speed: 1800  # 回抽和挤出补偿共用速度(mm/min)

#####################################################################
# 2. 用户钩子：放回热端  (默认实现 = 报错，必须替换)
#
#    入参 TOOL=<int>，框架已做好 G90 / Z 抬升 / accel 切换 / 入口夹紧自检。
#    在这里写"把 T{tool} 热端放回坞"的机械动作。
#
#    动作结束记得用 M400 等待运动队列清空。
#####################################################################
[gcode_macro multitool_release_tool]
gcode:
    {% set tool = params.TOOL|int %}
    {action_raise_error(
        "[multitool] 钩子 multitool_release_tool 未实现！"
        "请在 ~/printer_data/config/multitool/multitool_config.cfg "
        "中替换该宏，写入将 T%d 放回坞的机械动作。" % tool)}

    # ====== 示例（请删除上方 action_raise_error 后填入你的动作）======
    # G90
    # G0 X<dock_x> Y<dock_entry_y> F15000     # 1. 到达坞口
    # G0 X<dock_x> Y<dock_y>        F1200     # 2. 进入坞
    # G0 X<dock_x + shift> Y<dock_y> F400     # 3. 横移开摆臂
    # G0 X<dock_x + shift> Y<dock_dodge_y> F400  # 4. Y 退避，磁吸分离
    # G0 X<dock_x>         Y<dock_dodge_y> F400  # 5. 闭合摆臂
    # G0 X<dock_x>         Y<dock_entry_y> F1200 # 6. 退回入口
    # M400


#####################################################################
# 2. 用户钩子：抓取热端  (默认实现 = 报错，必须替换)
#
#    入参 TOOL=<int>。
#    在这里写"从坞中抓起 T{tool} 热端"的机械动作。
#
#    动作结束记得用 M400 等待运动队列清空。
#####################################################################
[gcode_macro multitool_pickup_tool]
gcode:
    {% set tool = params.TOOL|int %}
    {action_raise_error(
        "[multitool] 钩子 multitool_pickup_tool 未实现！"
        "请在 ~/printer_data/config/multitool/multitool_config.cfg "
        "中替换该宏，写入从坞中抓起 T%d 的机械动作。" % tool)}

    # ====== 示例（请删除上方 action_raise_error 后填入你的动作）======
    # G90
    # G0 X<dock_x> Y<dock_entry_y>      F15000  # 1. 到达坞口
    # G0 X<dock_x> Y<dock_dodge_y>      F1200   # 2. 避让位置
    # G0 X<dock_x + shift> Y<dock_dodge_y> F400 # 3. 横移开摆臂
    # G0 X<dock_x + shift> Y<dock_y>    F400    # 4. Y 前进，磁吸结合
    # G0 X<dock_x>         Y<dock_y>    F400    # 5. 闭合摆臂
    # G0 X<dock_x>         Y<dock_entry_y> F1200  # 6. 退回入口
    # M400


#####################################################################
# 温度命令覆写：M104 / M109 默认作用于当前工具
#
#   覆写入口保留在配置中，原始 Klipper 命令会保留为 M99104 / M99109。
#   断料续打组实际工具解析由 [multitool] Python 辅助命令统一完成。
#
#   - 未传 T 时：当前有热端则用 current_tool；无热端则默认 T0。
#   - 若目标工具无耗材且在 continuation_groups 中，则复用
#     multitool_filament 的同一套续打组解析逻辑选择实际工具；普通降温也
#     会解析实际工具。组内无可用工具时，按传入工具执行。
#     只有断料续打内部关闭旧热端时会显式绕过该解析。
#   - M109 会先设温，再用 TEMPERATURE_WAIT 等待目标温度 ±1.5°C。
#   - 目标温度低于 50°C 时只设温不等待，避免 M109 S0 长时间等待冷却。
#####################################################################
[gcode_macro M104]
rename_existing: M99104
gcode:
    {% set s = params.S|default(0)|float %}
    {% set r = params.R|default(0)|float %}
    {% set target = s if s > 0 else r %}
    {% set mt = printer.multitool %}
    {% set requested = params.T|int if params.T is defined
                     else (mt.current_tool|int if mt.current_tool|int >= 0 else 0) %}
    MULTITOOL_SET_TEMPERATURE TOOL={requested} S={s} R={r} COMMAND=M104

[gcode_macro M109]
rename_existing: M99109
gcode:
    {% set s = params.S|default(0)|float %}
    {% set r = params.R|default(0)|float %}
    {% set target = s if s > 0 else r %}
    {% set mt = printer.multitool %}
    {% set requested = params.T|int if params.T is defined
                     else (mt.current_tool|int if mt.current_tool|int >= 0 else 0) %}
    M104 T{requested} S{target}
    {% if target >= 50 %}
        MULTITOOL_WAIT_TEMPERATURE TOOL={requested} S={s} R={r} COMMAND=M109
    {% endif %}


# 偏移管理（可选）
[multitool_offsets]
z_offset_adaptive: False        # 启用 Z 偏移自适应 (用于压力Z限位/Tap)

# 换头计时统计（可选）
[multitool_stats]
