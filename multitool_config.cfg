#####################################################################
# klipper-multitool-stats - 默认配置文件
#
# 此文件由 install.sh 自动复制到 ~/printer_data/config/multitool/。
# 你应该：
#   1. 修改下面的 [multitool] 字段（tool_count / z_hop / accel 等）
#   2. 替换 multitool_release_tool / multitool_pickup_tool 两个钩子宏
#      的实现，写入你机器的真实换头动作
#
# 重要：默认钩子实现会直接 action_raise_error 报错。
#       不替换钩子无法完成换头。
#####################################################################


#####################################################################
# 1. 插件 section（声明即启用）
#####################################################################
[multitool]
tool_count: 4
z_hop: 0.4
feed_z: 600
accel_swap: 8000
untool_safe_z: 10        # 上次为"无热端"时第一动作要抬到的安全 Z
sync_active_spool: True  # 换头后同步 Spoolman 当前料盘

# 偏移管理（可选）
[multitool_offsets]
z_offset_adaptive: False

# 夹紧检测（可选）—— 不需要时整段删除
[multitool_clamp]
pin: ^!toolhead:TOOL_CLAMP    # ! 反相，模块约定 PRESSED = 已夹紧
settle_ms: 50

# 换头计时统计（可选）
[multitool_stats]

# 耗材检查（可选）—— 不需要时整段删除
# 通道电平变化时在控制台输出"耗材已装载/已卸载"提示。
# 电平用 ^ / ! / ~ 在各 pin 行控制，PRESSED = 已装载。
#
# 打印前耗材检查命令：CHECK_PRINT_FILAMENT TOOLS=0,1,2
#   逐通道输出状态总览；任一所需通道无耗材 → 报错中止（PRINT_START 随之中断）。
#   在你的 PRINT_START 宏开头加一行（TOOLS 由切片器 start gcode 传入）：
#     CHECK_PRINT_FILAMENT TOOLS={params.TOOLS}
[multitool_filament]
# 断料续打组（可选）：格式 [a,b,...],[c],[d] —— 每个方括号是一个有序续打组。
# 打印中当前热端断料时，会在它所在组里从它之后按顺序(环绕)找下一个有料热端，
# 自动 PAUSE → 换头 → RESUME 续打；跳过同样没料的成员。
# 当前热端不在任何组 / 组里只有它自己 / 全组都没料 → 正常暂停打印。
# 不配置此项则断料只打印提示，不自动续打/暂停。
continuation_groups: [1,2],[0],[3]
# 断料后延后续打（可选）：断料触发后先继续打印，直到挤出机净送料达到此长度(mm)
# 才触发续打/暂停，用于消耗料管(传感器→喷嘴)内的残余耗材。0=立即触发(默认)。
# runout_continue_length: 50
# runout_continue_poll_s: 0.3   # 延后期间轮询挤出机位置的间隔(秒)，默认 0.3
# runout_event_delay: 3     # 断料事件去抖窗口(秒)，默认 3
pin_0: ^multihotend:IO0
pin_1: ^multihotend:IO1
pin_2: ^multihotend:IO2
pin_3: ^multihotend:IO3


#####################################################################
# 2. 用户钩子：放回热端  (默认实现 = 报错，必须替换)
#
#    入参 TOOL=<int>，框架已做好 G90 / Z 抬升 / accel 切换 / 入口夹紧自检。
#    在这里写"把 T{tool} 热端放回坞"的机械动作。
#
#    动作结束记得用 M400 等待运动队列清空。
#####################################################################
[gcode_macro multitool_release_tool]
gcode:
    {% set tool = params.TOOL|int %}
    {action_raise_error(
        "[multitool] 钩子 multitool_release_tool 未实现！"
        "请在 ~/printer_data/config/multitool/multitool_config.cfg "
        "中替换该宏，写入将 T%d 放回坞的机械动作。" % tool)}

    # ====== 示例（请删除上方 action_raise_error 后填入你的动作）======
    # G90
    # G0 X<dock_x> Y<dock_entry_y> F15000     # 1. 到达坞口
    # G0 X<dock_x> Y<dock_y>        F1200     # 2. 进入坞
    # G0 X<dock_x + shift> Y<dock_y> F400     # 3. 横移开摆臂
    # G0 X<dock_x + shift> Y<dock_dodge_y> F400  # 4. Y 退避，磁吸分离
    # G0 X<dock_x>         Y<dock_dodge_y> F400  # 5. 闭合摆臂
    # G0 X<dock_x>         Y<dock_entry_y> F1200 # 6. 退回入口
    # M400


#####################################################################
# 3. 用户钩子：抓取热端  (默认实现 = 报错，必须替换)
#
#    在这里写"从坞中抓起 T{tool} 热端"的机械动作。
#####################################################################
[gcode_macro multitool_pickup_tool]
gcode:
    {% set tool = params.TOOL|int %}
    {action_raise_error(
        "[multitool] 钩子 multitool_pickup_tool 未实现！"
        "请在 ~/printer_data/config/multitool/multitool_config.cfg "
        "中替换该宏，写入从坞中抓起 T%d 的机械动作。" % tool)}

    # ====== 示例（请删除上方 action_raise_error 后填入你的动作）======
    # G90
    # G0 X<dock_x> Y<dock_entry_y>      F15000  # 1. 到达坞口
    # G0 X<dock_x> Y<dock_dodge_y>      F1200   # 2. 避让位置
    # G0 X<dock_x + shift> Y<dock_dodge_y> F400 # 3. 横移开摆臂
    # G0 X<dock_x + shift> Y<dock_y>    F400    # 4. Y 前进，磁吸结合
    # G0 X<dock_x>         Y<dock_y>    F400    # 5. 闭合摆臂
    # G0 X<dock_x>         Y<dock_entry_y> F1200  # 6. 退回入口
    # M400


#####################################################################
# 4. 断料续打钩子（可选）—— 仅在用了 [multitool_filament] continuation_groups
#    时有意义。两个宏都可选：未定义则跳过。入参 FROM=<旧热端> TO=<新热端>。
#
#    续打编排（框架自动）：
#      PAUSE
#      → M104 T<新> S<旧热端温度>     (框架自动：复制旧热端温度到新热端)
#      → [before_swap]
#      → CHANGE_TOOL T=TO            (含等温)
#      → M104 T<旧> S0               (框架自动：换头后关闭旧热端)
#      → [after_swap]
#      → RESUME
#
#    multitool_filament_before_swap：换头"前"的额外动作（框架已自动给新热端
#      设好温度并等温，这里无需再设温）。
#
#    注意：RESTORE_GCODE_STATE 不会恢复加速度/速度限制 (SET_VELOCITY_LIMIT)，
#      但框架已在续打结尾自动把它们写回断料前的值，钩子内的临时改动不会残留
#      （仍建议钩子尽量不改）。每热端 gcode 偏移也已由框架在 RESUME 后自动
#      重新应用，无需在钩子里处理。
#####################################################################
#[gcode_macro multitool_filament_before_swap]
#gcode:
#    {% set frm = params.FROM|int %}
#    {% set to  = params.TO|int %}
#    # 在这里写换头前需要的额外动作（如有）。


#####################################################################
#    multitool_filament_after_swap：换头"后"、RESUME 前。常用于新热端
#      上料 / 吹料 / 排废 / Prime，确保续打前出料正常。
#####################################################################
