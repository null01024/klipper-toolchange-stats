#gcode:
#    {% set frm = params.FROM|int %}
#    {% set to  = params.TO|int %}
#    # 示例：在废料区挤出一段，确保新热端出料顺畅
#    # G90
#    # G0 X<purge_x> Y<purge_y> F12000
#    # M83
#    # G1 E30 F300
#    # M400
