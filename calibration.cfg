# tools_calibrate 来自 viesturz/klipper-toolchanger（GPLv3），由 install.sh 选择微动对刀时下载到 Klipper extras
# 用于喷嘴接触式对刀，校准结果会写入 t{n}_offset_x/y/z，自动被 [multitool_offsets] 读取
# 自动对刀插件配置；用于喷嘴接触式测量各工具相对偏移
[tools_calibrate]
pin: ^PD11        # 【必改】对刀器/喷嘴接触传感器引脚，按你的主板/工具头实际接线替换
travel_speed: 15  # 探测速度
spread: 4.5         # 探测范围
lower_z: 0.6      # 下压距离（需要自己测试合适值，似乎对校准效果有影响）
speed: 2          # 每次探测触发之间的回撤速度 (mm/s)
lift_speed: 4     # 探测完成后的 Z 轴抬升速度。注意：其配置的抬升高度必须大于各个工具头之间的 Z 轴物理高度差
final_lift_z: 1   # 最终完成探测后的 Z 轴安全抬升高度
sample_retract_dist: 2  # 每次探测后回撤的距离 (mm)
samples_tolerance: 0.1 # 多次探测结果的容差范围，超出则重试或报错
samples: 5              # 探测采样次数
samples_result: median  # 采样结果的计算方式：median（取中位数）或 average（取平均值）

# 以下变量均为示例值，请按你机器的实测坐标 / 工具数量填写
# 校准宏共用变量容器
[gcode_macro _TOOL_CALIB_VARS]
variable_sensor_x: 112.5      # 【必改】校准传感器的中心X坐标（实测填写）
variable_sensor_y: -4         # 【必改】校准传感器的中心Y坐标（实测填写）
variable_safe_x: 112          # 【必改】换刀/待机的安全区域X
variable_safe_y: 10.0         # 【必改】换刀/待机的安全区域Y
variable_safe_z: 10.0         # 【必改】换刀/待机的安全区域Z高度
variable_tool_count: 4        # 【必改】工具总数（需与 [multitool] tool_count 一致）
gcode:
    # 此处无需指令，仅用于存储变量
# ---------------------------------------------------------
# 校准单个工具
# 调用示例: CALIBRATE_TOOL TOOL=1
# ---------------------------------------------------------
# 校准单个工具；调用格式 CALIBRATE_TOOL TOOL=1
[gcode_macro CALIBRATE_TOOL]
gcode:
    {% set tool = params.TOOL|default(0)|int %} # 读取要校准的工具号；不传时默认 T0
    {% set vars = printer["gcode_macro _TOOL_CALIB_VARS"] %} # 读取传感器坐标和安全坐标
    
    G1 X{vars.safe_x} Y{vars.safe_y} Z{vars.safe_z} F9000 # 先移动到安全区域，避免换头前撞到传感器或停靠坞
    T{tool}                          # 切换到要校准的工具
    SET_GCODE_OFFSET X=0 Y=0 Z=0     # 校准前清除当前 G-code 偏移，避免旧偏移影响测量
    M118 偏移校准中，清除偏移值: X=0 Y=0 Z=0 # 在前端提示当前已清除偏移
    G1 X{vars.safe_x} Y{vars.safe_y} Z{vars.safe_z} F9000 # 换头后再次回到安全区域
    G1 X{vars.sensor_x} Y{vars.sensor_y} F9000 # 移动到对刀传感器中心上方
    
    {% if tool == 0 %}
        {action_respond_info("正在校准 T0 基准点...")}
        TOOL_LOCATE_SENSOR   # 使用 T0 定位传感器基准位置
        M400                  # 【关键】等待探测动作彻底走完
        G4 P500               # 【关键】停顿 0.5 秒，让系统处理坐标重置
        _DO_SAVE_CALIB_RESULT TOOL=0 # 保存 T0 基准结果，T0 偏移固定为 0
    {% else %}
        {action_respond_info("正在校准 T" ~ tool ~ " 的偏移量...")}
        TOOL_CALIBRATE_TOOL_OFFSET # 测量当前工具相对 T0 的 XYZ 偏移
        M400                  # 【关键】等待动作走完
        _DO_SAVE_CALIB_RESULT TOOL={tool} # 保存当前工具测得的偏移
    {% endif %}

    M400                              # 等待所有校准动作完成
    G90                               # 恢复绝对坐标模式
    G1 Z{vars.safe_z} F600    # 探测完后先单提 Z 轴
    G1 X{vars.safe_x} Y{vars.safe_y} F9000 # XY 回到安全区域
    UNTOOL                           # 校准完成后卸下当前工具

# 内部宏：把 tools_calibrate 的最后一次测量结果写入 save_variables
[gcode_macro _DO_SAVE_CALIB_RESULT]
gcode:
    {% set tool = params.TOOL|int %} # 当前要保存结果的工具号
    {% set res = printer.tools_calibrate.last_result %} # 读取 tools_calibrate 插件的最后测量结果
    
    {% if tool == 0 %}
        # T0 永远存 0
        SAVE_VARIABLE VARIABLE=t0_offset_x VALUE=0.0 # T0 作为 X 基准，固定保存 0
        SAVE_VARIABLE VARIABLE=t0_offset_y VALUE=0.0 # T0 作为 Y 基准，固定保存 0
        SAVE_VARIABLE VARIABLE=t0_offset_z VALUE=0.0 # T0 作为 Z 基准，固定保存 0
        {action_respond_info("✅ T0 基准点坐标已锁定")}
    {% else %}
        # 其他工具存探测结果
        SAVE_VARIABLE VARIABLE=t{tool}_offset_x VALUE={res[0]|round(6)} # 保存当前工具相对 T0 的 X 偏移
        SAVE_VARIABLE VARIABLE=t{tool}_offset_y VALUE={res[1]|round(6)} # 保存当前工具相对 T0 的 Y 偏移
        SAVE_VARIABLE VARIABLE=t{tool}_offset_z VALUE={res[2]|round(6)} # 保存当前工具相对 T0 的 Z 偏移
        {action_respond_info("✅ T" ~ tool ~ " 偏移量已自动保存")}
    {% endif %}
# ---------------------------------------------------------
# 批量校准所有工具
# ---------------------------------------------------------
# 批量校准所有工具，范围由 variable_tool_count 控制
[gcode_macro CALIBRATE_ALL_TOOLS]
gcode:
    {% set vars = printer["gcode_macro _TOOL_CALIB_VARS"] %} # 读取工具数量和安全坐标
    
    {action_respond_info("开始全自动工具校准流程...")}
    
    # 遍历所有工具 (range(0, N) 生成 0 到 N-1)
    {% for t in range(0, vars.tool_count) %}
        CALIBRATE_TOOL TOOL={t}      # 逐个调用单工具校准流程
    {% endfor %}
    
    {action_respond_info("所有工具校准完毕")}
